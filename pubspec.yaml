name: solq
description: SOLQ Payment Orchestrator
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.2
  http: ^1.1.0
  provider: ^6.0.5
  solana: ^0.31.0
  intl: ^0.18.1
  uuid: ^4.0.0
  url_launcher: ^6.2.1
  app_links: ^6.0.1
  shared_preferences: ^2.3.0
  bs58: ^1.0.2
  crypto: ^3.0.3
  pinenacl: ^0.6.0
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21


flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logos/solq_logo_wordmark.jpg
    - assets/logos/solq_logo_icon.jpg
    - assets/logos/solq_logo_wordmark_transparent.png
    - assets/logos/solq_logo_icon_transparent.png
