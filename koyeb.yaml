build:
  type: git
  branch: main
  build_command: "cd backend && npm install && npm run build"
  run_command: "cd backend && node dist/index.js"

environment_variables:
  - key: NODE_ENV
    value: production
  - key: PORT
    value: "8000"

ports:
  - protocol: http
    port: 8000

health_checks:
  - path: /health
    protocol: http
    port: 8000

