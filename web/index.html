<!DOCTYPE html>
<html>

<head>
  <!--

    The path provided below has to start and end with a slash "/" in order for

    This is a placeholder for base href that will be replaced by the value of

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SOLQ">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>SOLQ</title>
  <link rel="manifest" href="manifest.json">
</head>
<script>
  function getProvider() {
    if ('solana' in window) {
      const provider = window.solana;
      if (provider.isPhantom || provider.isSolflare || provider.isBackpack || provider.isMochila) {
        return provider;
      }
    }
    if (window.phantom && window.phantom.solana) return window.phantom.solana;
    if (window.solflare && window.solflare.solana) return window.solflare.solana;
    if (window.backpack && window.backpack.solana) return window.backpack.solana;
    if (window.okxwallet && window.okxwallet.solana) return window.okxwallet.solana;
    if (window.jupiter) return window.jupiter;
    return null;
  }

  window.solqConnect = async function () {
    const provider = getProvider();
    if (!provider) return null;
    try {
      const resp = await provider.connect();
      const pubKey = resp.publicKey ? resp.publicKey.toString() : (resp.address || resp);
      return pubKey.toString();
    } catch (e) {
      return null;
    }
  };

  window.solqSign = async function (base64Tx) {
    const provider = getProvider();
    if (!provider) return null;
    try {
      const binaryString = atob(base64Tx);
      const bytes = new Uint8Array(binaryString.length);
      for (let i = 0; i < binaryString.length; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }

      // Handle both VersionedTransaction and Legacy
      const decodedTx = typeof window.solanaWeb3 !== 'undefined'
        ? window.solanaWeb3.VersionedTransaction.deserialize(bytes)
        : bytes;

      const signedTx = await provider.signTransaction(decodedTx);
      const signedBytes = signedTx.serialize ? signedTx.serialize() : signedTx;
      return btoa(String.fromCharCode.apply(null, Array.from(new Uint8Array(signedBytes))));
    } catch (e) {
      return null;
    }
  };
</script>
<script src="flutter_bootstrap.js" async></script>
</body>

</html>
