  <meta charset="UTF-8">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="icon" type="image/png" href="favicon.png" />

  <link rel="manifest" href="manifest.json">
</head>
<script>
  function getProvider() {
    // 1. Check for standard window.solana
    if (window.solana) {
      if (window.solana.isPhantom || window.solana.isSolflare || window.solana.isBackpack) return window.solana;
    }
    // 2. Individual wallet objects
    if (window.phantom && window.phantom.solana) return window.phantom.solana;
    if (window.solflare && window.solflare.solana) return window.solflare.solana;
    if (window.backpack && window.backpack.solana) return window.backpack.solana;
    if (window.okxwallet && window.okxwallet.solana) return window.okxwallet.solana;
    if (window.jupiter) return window.jupiter;

    // 3. MetaMask Solana Snap support
    if (window.ethereum && window.ethereum.isMetaMask) return window.ethereum;

    return null;
  }

  window.solqConnect = async function () {
    const provider = getProvider();
    if (!provider) {
      console.error("No Solana provider found. Install Phantom or Solflare.");
      return null;
    }
    try {
      const resp = await provider.connect();
      // Handle different provider return styles
      const pubKey = resp.publicKey ? resp.publicKey.toString() : (resp.address || resp);
      return pubKey.toString();
    } catch (e) {
      console.error("Connection rejected:", e);
      return null;
    }
  };

  window.solqSign = async function (base64Tx) {
    const provider = getProvider();
    if (!provider) return null;
    try {
      const binaryString = atob(base64Tx);
      const bytes = new Uint8Array(binaryString.length);
      for (let i = 0; i < binaryString.length; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }

      // 101% Perfected Signing Logic
      // Most providers expect a Transaction object or a Uint8Array
      let signedTx;
      if (provider.signTransaction) {
        signedTx = await provider.signTransaction(bytes);
      } else if (provider.request) {
        // Eip1193 style (MetaMask)
        signedTx = await provider.request({
          method: 'solana_signTransaction',
          params: { transaction: base64Tx }
        });
      }

      if (!signedTx) return null;

      // Normalize result to Base64
      const signedBytes = signedTx.serialize ? signedTx.serialize() : (signedTx.signature || signedTx);
      const uint8Signed = new Uint8Array(signedBytes);

      let resBinary = '';
      for (let i = 0; i < uint8Signed.byteLength; i++) {
        resBinary += String.fromCharCode(uint8Signed[i]);
      }
      return btoa(resBinary);
    } catch (e) {
      console.error("Signing failed:", e);
      return null;
    }
  };
</script>
<script src="flutter_bootstrap.js" async></script>
